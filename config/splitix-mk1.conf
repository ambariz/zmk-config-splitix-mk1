# ─────────────────────────────────────────────────────────────
# Common settings for both left and right halves
# ─────────────────────────────────────────────────────────────

# Bluetooth
CONFIG_ZMK_BLE=y

# Optional: Clear bonding on every boot (remove this line after first flash)
# CONFIG_ZMK_BLE_CLEAR_BONDING_DATA_ON_START=y

# Power saving
CONFIG_ZMK_SLEEP=y

# OLED (both sides now have it)
CONFIG_ZMK_DISPLAY=y

# RGB - Per key + Underglow
CONFIG_ZMK_RGB_MATRIX=y
CONFIG_ZMK_RGB_UNDERGLOW=y

# Encoder (both sides now have it)
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Optional: Nice!nano specific optimizations
CONFIG_BT_MAX_CONN=2
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_CENTRAL=y